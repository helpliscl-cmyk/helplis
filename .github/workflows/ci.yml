name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y sqlite3
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
